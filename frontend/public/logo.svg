<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fda4af;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="sparkleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:0.6" />
    </radialGradient>
    
    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle (Optional) -->
  <circle cx="256" cy="256" r="256" fill="url(#glowGradient)" opacity="0.1"/>
  
  <!-- Outer Glow Heart -->
  <path d="M256 448L64 256C24 216 24 152 64 112C104 72 168 72 208 112L256 160L304 112C344 72 408 72 448 112C488 152 488 216 448 256L256 448Z" 
        fill="url(#glowGradient)" 
        opacity="0.6"
        filter="url(#glow)"/>
  
  <!-- Main Heart -->
  <path d="M256 432L80 256C44 220 44 164 80 128C116 92 172 92 208 128L256 176L304 128C340 92 396 92 432 128C468 164 468 220 432 256L256 432Z" 
        fill="url(#heartGradient)" 
        filter="url(#glow)"/>
  
  <!-- Sparkle 1 (Top Right) -->
  <circle cx="380" cy="120" r="16" fill="url(#sparkleGradient)" filter="url(#glow)"/>
  <path d="M380 100 L380 140 M360 120 L400 120" stroke="#fef08a" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Sparkle 2 (Top Left) -->
  <circle cx="140" cy="140" r="12" fill="url(#sparkleGradient)" filter="url(#glow)" opacity="0.8"/>
  <path d="M140 126 L140 154 M126 140 L154 140" stroke="#fef08a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Sparkle 3 (Bottom) -->
  <circle cx="256" cy="360" r="10" fill="url(#sparkleGradient)" filter="url(#glow)" opacity="0.6"/>
  <path d="M256 348 L256 372 M244 360 L268 360" stroke="#fef08a" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
