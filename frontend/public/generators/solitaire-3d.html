<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
for(let i=0;i<7;i++){
  const cardGeometry=new THREE.BoxGeometry(3,4,0.1);
  const cardMaterial=new THREE.MeshStandardMaterial({color:0x8800ff,metalness:0.8,roughness:0.2,emissive:0x8800ff,emissiveIntensity:0.8});
  const card=new THREE.Mesh(cardGeometry,cardMaterial);
  card.position.y=i*0.8-3;card.position.z=i*0.1;scene.add(card);
}
const topCardGeometry=new THREE.BoxGeometry(3,4,0.1);
const topCardMaterial=new THREE.MeshStandardMaterial({color:0x00ffff,metalness:1.0,roughness:0.1,emissive:0x00ffff,emissiveIntensity:1.5});
const topCard=new THREE.Mesh(topCardGeometry,topCardMaterial);
topCard.position.y=4;topCard.position.z=1;scene.add(topCard);
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(10+i*2,0.2,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0x8800ff:0x00ffff,transparent:true,opacity:0.4});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x220044,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0x8800ff,3,100);pointLight1.position.set(12,15,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0x00ffff,3,100);pointLight2.position.set(-12,15,20);scene.add(pointLight2);
camera.position.set(0,3,20);camera.lookAt(0,0,0);let time=0;
function animate(){requestAnimationFrame(animate);time+=0.02;topCard.rotation.y=time;topCard.position.y=4+Math.sin(time*2)*0.5;scene.children.forEach(child=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.008;});renderer.render(scene,camera);}
animate();
</script></body></html>
