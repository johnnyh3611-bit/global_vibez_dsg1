<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
const shipGeometry=new THREE.BoxGeometry(2,6,1);
const shipMaterial=new THREE.MeshStandardMaterial({color:0x00ffff,metalness:0.9,roughness:0.1,emissive:0x00ffff,emissiveIntensity:1.2});
for(let i=0;i<5;i++){
  const ship=new THREE.Mesh(shipGeometry,shipMaterial);
  ship.position.x=(i-2)*3;ship.position.y=Math.sin(i)*2;ship.rotation.z=i*0.1;
  scene.add(ship);
}
const gridHelper=new THREE.GridHelper(20,10,0x00ffff,0x004488);
gridHelper.position.y=-8;scene.add(gridHelper);
for(let i=0;i<8;i++){
  const hitGeometry=new THREE.SphereGeometry(0.5,16,16);
  const hitMaterial=new THREE.MeshStandardMaterial({color:0xff0055,emissive:0xff0055,emissiveIntensity:2.0});
  const hit=new THREE.Mesh(hitGeometry,hitMaterial);
  hit.position.x=Math.random()*16-8;hit.position.z=Math.random()*16-8;hit.position.y=-7;
  scene.add(hit);
}
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(12+i*2,0.3,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0x00ffff:0xff0055,transparent:true,opacity:0.4});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x004488,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0x00ffff,4,100);pointLight1.position.set(15,15,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0xff0055,3,100);pointLight2.position.set(-15,10,20);scene.add(pointLight2);
camera.position.set(0,8,22);camera.lookAt(0,0,0);let time=0;
function animate(){requestAnimationFrame(animate);time+=0.02;scene.children.forEach((child,i)=>{if(child.geometry&&child.geometry.type==='BoxGeometry'&&i<5){child.position.y=Math.sin(time+i)*2;}if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.01;});renderer.render(scene,camera);}
animate();
</script></body></html>
