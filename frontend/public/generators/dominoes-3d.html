<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
for(let i=0;i<7;i++){
  const dominoGeometry=new THREE.BoxGeometry(2,4,0.5);
  const dominoMaterial=new THREE.MeshStandardMaterial({color:0xffffff,metalness:0.8,roughness:0.2});
  const domino=new THREE.Mesh(dominoGeometry,dominoMaterial);
  domino.position.x=(i-3)*2.5;domino.position.y=i*0.3;domino.rotation.z=Math.random()*0.2-0.1;
  scene.add(domino);
  for(let j=0;j<2;j++){
    for(let k=0;k<3;k++){
      const dotGeometry=new THREE.SphereGeometry(0.2,16,16);
      const dotMaterial=new THREE.MeshStandardMaterial({color:i%2===0?0xff00ff:0x00ffff,emissive:i%2===0?0xff00ff:0x00ffff,emissiveIntensity:2.0});
      const dot=new THREE.Mesh(dotGeometry,dotMaterial);
      dot.position.x=domino.position.x+(k-1)*0.5;dot.position.y=domino.position.y+(j===0?0.8:-0.8);dot.position.z=0.3;
      scene.add(dot);
    }
  }
}
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(12+i*2,0.2,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0xff00ff:0x00ffff,transparent:true,opacity:0.4});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x444444,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0xff00ff,3,100);pointLight1.position.set(15,15,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0x00ffff,3,100);pointLight2.position.set(-15,15,20);scene.add(pointLight2);
camera.position.z=22;let time=0;
function animate(){requestAnimationFrame(animate);time+=0.02;scene.rotation.y=Math.sin(time)*0.08;scene.children.forEach(child=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.01;});renderer.render(scene,camera);}
animate();
</script></body></html>
