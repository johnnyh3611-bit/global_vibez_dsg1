<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>body { margin: 0; background: #000; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(1000, 1000);
    renderer.setClearColor(0x000000);
    document.body.appendChild(renderer.domElement);

    // Dartboard base
    const boardGeometry = new THREE.CylinderGeometry(10, 10, 0.5, 32);
    const boardMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x000000,
      metalness: 0.3,
      roughness: 0.7
    });
    const board = new THREE.Mesh(boardGeometry, boardMaterial);
    scene.add(board);

    // Target rings
    const rings = [8, 6, 4, 2];
    const ringColors = [0xff0055, 0x00ff88, 0xffff00, 0xff00ff];
    rings.forEach((radius, i) => {
      const ringGeometry = new THREE.TorusGeometry(radius, 0.3, 8, 50);
      const ringMaterial = new THREE.MeshStandardMaterial({ 
        color: ringColors[i],
        metalness: 0.8,
        roughness: 0.2,
        emissive: ringColors[i],
        emissiveIntensity: 1.5
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = 0.3;
      scene.add(ring);
    });

    // Bullseye
    const bullseyeGeometry = new THREE.CircleGeometry(1.5, 32);
    const bullseyeMaterial = new THREE.MeshBasicMaterial({ 
      color: 0x00ffff,
      emissive: 0x00ffff,
      emissiveIntensity: 2.0
    });
    const bullseye = new THREE.Mesh(bullseyeGeometry, bullseyeMaterial);
    bullseye.rotation.x = -Math.PI / 2;
    bullseye.position.y = 0.4;
    scene.add(bullseye);

    // Darts
    for (let i = 0; i < 3; i++) {
      const dartGeometry = new THREE.ConeGeometry(0.3, 3, 8);
      const dartMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xff00ff,
        metalness: 1.0,
        roughness: 0.1,
        emissive: 0xff00ff,
        emissiveIntensity: 1.0
      });
      const dart = new THREE.Mesh(dartGeometry, dartMaterial);
      const angle = (i / 3) * Math.PI * 2;
      dart.position.x = Math.cos(angle) * 3;
      dart.position.z = Math.sin(angle) * 3;
      dart.position.y = 3;
      dart.rotation.x = Math.PI;
      scene.add(dart);
    }

    const ambientLight = new THREE.AmbientLight(0x220044, 1.5);
    scene.add(ambientLight);
    const pointLight1 = new THREE.PointLight(0xff00ff, 3, 100);
    pointLight1.position.set(10, 15, 10);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0x00ffff, 3, 100);
    pointLight2.position.set(-10, 15, 10);
    scene.add(pointLight2);

    camera.position.set(0, 15, 25);
    camera.lookAt(0, 0, 0);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;
      scene.rotation.y = Math.sin(time) * 0.1;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
