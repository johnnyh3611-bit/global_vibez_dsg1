<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
const boardGeometry=new THREE.CylinderGeometry(8,8,0.5,12);
const boardMaterial=new THREE.MeshStandardMaterial({color:0x8B4513,metalness:0.3,roughness:0.8});
const board=new THREE.Mesh(boardGeometry,boardMaterial);
scene.add(board);
for(let i=0;i<12;i++){
  const pitGeometry=new THREE.CylinderGeometry(1,0.8,0.6,16);
  const pitMaterial=new THREE.MeshStandardMaterial({color:0x654321,metalness:0.2,roughness:0.9});
  const pit=new THREE.Mesh(pitGeometry,pitMaterial);
  const angle=(i/12)*Math.PI*2;
  pit.position.x=Math.cos(angle)*5;pit.position.z=Math.sin(angle)*5;pit.position.y=0.3;
  scene.add(pit);
  for(let j=0;j<3;j++){
    const stoneGeometry=new THREE.SphereGeometry(0.3,16,16);
    const stoneMaterial=new THREE.MeshStandardMaterial({color:0xff00ff,metalness:0.9,roughness:0.1,emissive:0xff00ff,emissiveIntensity:1.0});
    const stone=new THREE.Mesh(stoneGeometry,stoneMaterial);
    stone.position.x=pit.position.x+Math.random()*0.4-0.2;stone.position.z=pit.position.z+Math.random()*0.4-0.2;stone.position.y=0.5+j*0.3;
    scene.add(stone);
  }
}
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(11+i*2,0.2,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0xff00ff:0x00ffff,transparent:true,opacity:0.4});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  ring.rotation.x=Math.PI/2;scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x442200,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0xff00ff,3,100);pointLight1.position.set(15,15,15);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0x00ffff,3,100);pointLight2.position.set(-15,15,15);scene.add(pointLight2);
camera.position.set(0,15,20);camera.lookAt(0,0,0);let time=0;
function animate(){requestAnimationFrame(animate);time+=0.01;scene.rotation.y=Math.sin(time)*0.1;scene.children.forEach(child=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.008;});renderer.render(scene,camera);}
animate();
</script></body></html>
