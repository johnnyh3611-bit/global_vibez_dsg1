<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>body { margin: 0; background: #000; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(1000, 1000);
    renderer.setClearColor(0x000000);
    document.body.appendChild(renderer.domElement);

    // Pool table
    const tableGeometry = new THREE.BoxGeometry(20, 0.5, 12);
    const tableMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x00aa44,
      metalness: 0.3,
      roughness: 0.8,
      emissive: 0x00aa44,
      emissiveIntensity: 0.3
    });
    const table = new THREE.Mesh(tableGeometry, tableMaterial);
    table.position.y = -5;
    scene.add(table);

    // 8-ball (center, large)
    const ballGeometry = new THREE.SphereGeometry(2, 32, 32);
    const ballMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x000000,
      metalness: 1.0,
      roughness: 0.1
    });
    const eightBall = new THREE.Mesh(ballGeometry, ballMaterial);
    scene.add(eightBall);

    // White circle on 8-ball
    const circleGeometry = new THREE.CircleGeometry(1, 32);
    const circleMaterial = new THREE.MeshBasicMaterial({ 
      color: 0xffffff,
      side: THREE.DoubleSide
    });
    const circle = new THREE.Mesh(circleGeometry, circleMaterial);
    circle.position.z = 2.01;
    eightBall.add(circle);

    // Colorful pool balls around
    const ballColors = [0xffff00, 0xff0000, 0x0000ff, 0xff00ff, 0x00ffff, 0xff8800];
    ballColors.forEach((color, i) => {
      const smallBallGeometry = new THREE.SphereGeometry(1.2, 32, 32);
      const smallBallMaterial = new THREE.MeshStandardMaterial({ 
        color: color,
        metalness: 0.9,
        roughness: 0.1,
        emissive: color,
        emissiveIntensity: 0.8
      });
      const smallBall = new THREE.Mesh(smallBallGeometry, smallBallMaterial);
      const angle = (i / ballColors.length) * Math.PI * 2;
      smallBall.position.x = Math.cos(angle) * 6;
      smallBall.position.z = Math.sin(angle) * 6;
      smallBall.position.y = 0;
      scene.add(smallBall);
    });

    // Neon glow rings
    for (let i = 0; i < 3; i++) {
      const ringGeometry = new THREE.TorusGeometry(10 + i * 2, 0.2, 8, 50);
      const ringMaterial = new THREE.MeshBasicMaterial({ 
        color: i === 0 ? 0x00ffff : (i === 1 ? 0xff00ff : 0xffff00),
        transparent: true,
        opacity: 0.4
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.position.y = -5;
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);
    }

    const ambientLight = new THREE.AmbientLight(0x004400, 1.5);
    scene.add(ambientLight);
    const pointLight1 = new THREE.PointLight(0x00ffff, 3, 100);
    pointLight1.position.set(15, 15, 15);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0xff00ff, 3, 100);
    pointLight2.position.set(-15, 15, 15);
    scene.add(pointLight2);

    camera.position.set(0, 10, 20);
    camera.lookAt(0, 0, 0);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.02;
      eightBall.rotation.y = time;
      scene.children.forEach((child) => {
        if (child.geometry && child.geometry.type === 'TorusGeometry') {
          child.rotation.z += 0.01;
        }
      });
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
