<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, device-height=1000, initial-scale=1.0">
  <title>3D Slot Machine Card</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/FontLoader.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(1000, 1000);
    renderer.setClearColor(0x000000);
    document.body.appendChild(renderer.domElement);

    // Slot machine body
    const machineGeometry = new THREE.BoxGeometry(12, 16, 4);
    const machineMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x8800ff,
      metalness: 0.9,
      roughness: 0.1,
      emissive: 0x4400aa,
      emissiveIntensity: 0.5
    });
    const machine = new THREE.Mesh(machineGeometry, machineMaterial);
    scene.add(machine);

    // Screen (3 reels)
    const reels = [];
    for (let i = 0; i < 3; i++) {
      const reelGeometry = new THREE.CylinderGeometry(2, 2, 8, 32);
      const reelMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x000000,
        metalness: 0.8,
        roughness: 0.3,
        emissive: 0xff00ff,
        emissiveIntensity: 0.3
      });
      const reel = new THREE.Mesh(reelGeometry, reelMaterial);
      reel.position.x = (i - 1) * 4;
      reel.position.y = 2;
      reel.position.z = 2.5;
      reel.rotation.z = Math.PI / 2;
      machine.add(reel);
      reels.push(reel);
      
      // Add symbols (777, cherry, bar)
      const symbols = ['7', '🍒', '⭐'];
      symbols.forEach((symbol, j) => {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ff00ff';
        ctx.font = 'bold 150px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(symbol, 128, 128);
        
        const texture = new THREE.CanvasTexture(canvas);
        const symbolMaterial = new THREE.MeshBasicMaterial({ map: texture });
        const symbolGeometry = new THREE.PlaneGeometry(1.5, 1.5);
        const symbolMesh = new THREE.Mesh(symbolGeometry, symbolMaterial);
        const angle = (j / symbols.length) * Math.PI * 2;
        symbolMesh.position.x = Math.cos(angle) * 2;
        symbolMesh.position.y = Math.sin(angle) * 2;
        symbolMesh.rotation.y = -angle + Math.PI / 2;
        reel.add(symbolMesh);
      });
    }

    // Neon frame
    const frameGeometry = new THREE.BoxGeometry(13, 11, 0.5);
    const frameMaterial = new THREE.MeshBasicMaterial({ 
      color: 0x00ffff,
      transparent: true,
      opacity: 0.8
    });
    const frame = new THREE.Mesh(frameGeometry, frameMaterial);
    frame.position.y = 2;
    frame.position.z = 5;
    machine.add(frame);

    // Neon glow
    for (let i = 0; i < 4; i++) {
      const glowGeometry = new THREE.TorusGeometry(10 + i, 0.3, 8, 50);
      const glowMaterial = new THREE.MeshBasicMaterial({ 
        color: i % 2 === 0 ? 0xff00ff : 0x00ffff,
        transparent: true,
        opacity: 0.4 - i * 0.08
      });
      const glow = new THREE.Mesh(glowGeometry, glowMaterial);
      glow.position.z = -2;
      scene.add(glow);
    }

    // Lights
    const ambientLight = new THREE.AmbientLight(0x220044, 1.5);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0xff00ff, 4, 100);
    pointLight1.position.set(15, 15, 20);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x00ffff, 4, 100);
    pointLight2.position.set(-15, 15, 20);
    scene.add(pointLight2);

    camera.position.z = 30;
    camera.position.y = 5;
    camera.lookAt(0, 0, 0);

    // Animation
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.05;
      
      // Spin reels at different speeds
      reels.forEach((reel, index) => {
        reel.rotation.x = time * (1 + index * 0.3);
      });
      
      // Pulse machine
      machine.scale.set(
        1 + Math.sin(time * 2) * 0.02,
        1 + Math.sin(time * 2) * 0.02,
        1
      );
      
      // Rotate neon glows
      scene.children.forEach((child) => {
        if (child.geometry && child.geometry.type === 'TorusGeometry') {
          child.rotation.z += 0.01;
        }
      });
      
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
