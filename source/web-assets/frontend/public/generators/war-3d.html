<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
for(let i=0;i<4;i++){
  const cardGeometry=new THREE.BoxGeometry(3.5,5,0.1);
  const isRed=i%2===0;
  const cardMaterial=new THREE.MeshStandardMaterial({color:isRed?0xff0000:0x0000ff,metalness:0.9,roughness:0.1,emissive:isRed?0xff0055:0x00ffff,emissiveIntensity:1.5});
  const card=new THREE.Mesh(cardGeometry,cardMaterial);
  card.position.x=(i<2?-4:4);card.position.y=(i%2===0?2:-2);card.position.z=i*0.5;
  card.rotation.z=(i<2?-0.3:0.3);scene.add(card);
}
const explosionGeometry=new THREE.SphereGeometry(3,32,32);
const explosionMaterial=new THREE.MeshBasicMaterial({color:0xffff00,transparent:true,opacity:0.6,emissive:0xffff00,emissiveIntensity:2.0});
const explosion=new THREE.Mesh(explosionGeometry,explosionMaterial);
scene.add(explosion);
for(let i=0;i<4;i++){
  const ringGeometry=new THREE.TorusGeometry(8+i*2,0.2,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i%2===0?0xff0055:0x00ffff,transparent:true,opacity:0.5});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x440000,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0xff0000,4,100);pointLight1.position.set(15,10,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0x0000ff,4,100);pointLight2.position.set(-15,10,20);scene.add(pointLight2);
camera.position.set(0,5,22);camera.lookAt(0,0,0);let time=0;
function animate(){requestAnimationFrame(animate);time+=0.03;explosion.scale.set(1+Math.sin(time*2)*0.3,1+Math.sin(time*2)*0.3,1+Math.sin(time*2)*0.3);explosion.material.opacity=0.4+Math.abs(Math.sin(time))*0.4;scene.children.forEach(child=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.015;});renderer.render(scene,camera);}
animate();
</script></body></html>
