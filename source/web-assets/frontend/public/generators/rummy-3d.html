<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
for(let i=0;i<5;i++){
  const cardGeometry=new THREE.BoxGeometry(3,4.5,0.1);
  const cardMaterial=new THREE.MeshStandardMaterial({color:i%2===0?0xff0055:0x00ffff,metalness:0.8,roughness:0.2,emissive:i%2===0?0xff0055:0x00ffff,emissiveIntensity:1.0});
  const card=new THREE.Mesh(cardGeometry,cardMaterial);
  card.position.x=(i-2)*1.5;card.position.y=i*0.3;card.position.z=i*0.2;
  card.rotation.z=Math.random()*0.3-0.15;scene.add(card);
}
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(12+i*2,0.2,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0xff00ff:(i===1?0x00ffff:0xff0055),transparent:true,opacity:0.4});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x440044,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0xff00ff,3,100);pointLight1.position.set(15,15,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0x00ffff,3,100);pointLight2.position.set(-15,15,20);scene.add(pointLight2);
camera.position.z=18;let time=0;
function animate(){requestAnimationFrame(animate);time+=0.02;scene.rotation.y=Math.sin(time)*0.1;scene.children.forEach((child,i)=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.01;});renderer.render(scene,camera);}
animate();
</script></body></html>
