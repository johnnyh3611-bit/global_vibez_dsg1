<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>body { margin: 0; background: #000; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(1000, 1000);
    renderer.setClearColor(0x000000);
    document.body.appendChild(renderer.domElement);

    // Ping pong table
    const tableGeometry = new THREE.BoxGeometry(18, 0.3, 10);
    const tableMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x0066ff,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x0066ff,
      emissiveIntensity: 0.5
    });
    const table = new THREE.Mesh(tableGeometry, tableMaterial);
    table.position.y = -3;
    scene.add(table);

    // Net
    const netGeometry = new THREE.BoxGeometry(0.2, 2, 10);
    const netMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xffffff,
      emissive: 0x00ffff,
      emissiveIntensity: 1.0
    });
    const net = new THREE.Mesh(netGeometry, netMaterial);
    net.position.y = -2;
    scene.add(net);

    // Ping pong ball
    const ballGeometry = new THREE.SphereGeometry(1, 32, 32);
    const ballMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xffffff,
      metalness: 1.0,
      roughness: 0.1,
      emissive: 0xff00ff,
      emissiveIntensity: 1.5
    });
    const ball = new THREE.Mesh(ballGeometry, ballMaterial);
    scene.add(ball);

    // Paddles
    const paddleGeometry = new THREE.CylinderGeometry(2, 2, 0.3, 32);
    const paddleMaterial1 = new THREE.MeshStandardMaterial({ 
      color: 0xff0055,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0xff0055,
      emissiveIntensity: 1.0
    });
    const paddle1 = new THREE.Mesh(paddleGeometry, paddleMaterial1);
    paddle1.position.set(-6, 0, 3);
    paddle1.rotation.x = Math.PI / 2;
    scene.add(paddle1);

    const paddleMaterial2 = new THREE.MeshStandardMaterial({ 
      color: 0x00ffff,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x00ffff,
      emissiveIntensity: 1.0
    });
    const paddle2 = new THREE.Mesh(paddleGeometry, paddleMaterial2);
    paddle2.position.set(6, 0, -3);
    paddle2.rotation.x = Math.PI / 2;
    scene.add(paddle2);

    // Motion trail particles
    const particleGeometry = new THREE.BufferGeometry();
    const particleCount = 50;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 20;
    }
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMaterial = new THREE.PointsMaterial({ 
      color: 0xff00ff,
      size: 0.5,
      transparent: true,
      opacity: 0.6
    });
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const ambientLight = new THREE.AmbientLight(0x004488, 1.5);
    scene.add(ambientLight);
    const pointLight1 = new THREE.PointLight(0xff00ff, 3, 100);
    pointLight1.position.set(10, 15, 10);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0x00ffff, 3, 100);
    pointLight2.position.set(-10, 15, 10);
    scene.add(pointLight2);

    camera.position.set(0, 12, 18);
    camera.lookAt(0, 0, 0);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.05;
      ball.position.x = Math.sin(time) * 6;
      ball.position.y = Math.abs(Math.cos(time * 2)) * 4;
      ball.position.z = Math.cos(time * 0.7) * 3;
      particles.rotation.y += 0.005;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
