<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
const glassGeometry=new THREE.CylinderGeometry(2,1.5,6,32);
const glassMaterial=new THREE.MeshPhysicalMaterial({color:0x00ffff,metalness:0.1,roughness:0.1,transparent:true,opacity:0.6,emissive:0x00ffff,emissiveIntensity:0.8});
const glass=new THREE.Mesh(glassGeometry,glassMaterial);
scene.add(glass);
for(let i=0;i<3;i++){
  const cardGeometry=new THREE.BoxGeometry(2,3,0.1);
  const cardMaterial=new THREE.MeshStandardMaterial({color:0xff00ff,metalness:0.9,roughness:0.1,emissive:0xff00ff,emissiveIntensity:1.2});
  const card=new THREE.Mesh(cardGeometry,cardMaterial);
  const angle=(i/3)*Math.PI*2;
  card.position.x=Math.cos(angle)*5;card.position.z=Math.sin(angle)*5;card.position.y=-2;
  card.rotation.y=-angle;scene.add(card);
}
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(10+i*2,0.3,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0xff00ff:0x00ffff,transparent:true,opacity:0.5});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x004444,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0xff00ff,4,100);pointLight1.position.set(15,15,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0x00ffff,4,100);pointLight2.position.set(-15,15,20);scene.add(pointLight2);
camera.position.set(0,8,20);camera.lookAt(0,0,0);let time=0;
function animate(){requestAnimationFrame(animate);time+=0.02;glass.rotation.y=time;scene.children.forEach(child=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.01;});renderer.render(scene,camera);}
animate();
</script></body></html>
