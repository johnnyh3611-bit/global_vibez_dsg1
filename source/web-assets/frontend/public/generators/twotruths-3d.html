<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#000;}</style></head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,1,0.1,1000),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(1000,1000);renderer.setClearColor(0x000000);document.body.appendChild(renderer.domElement);
const numbers=[1,2,3];
for(let i=0;i<3;i++){
  const numGeometry=new THREE.BoxGeometry(3,4,1);
  const isLie=i===2;
  const numMaterial=new THREE.MeshStandardMaterial({color:isLie?0xff0055:0x00ffff,metalness:0.9,roughness:0.1,emissive:isLie?0xff0055:0x00ffff,emissiveIntensity:isLie?2.0:1.2});
  const num=new THREE.Mesh(numGeometry,numMaterial);
  num.position.x=(i-1)*5;num.position.y=Math.sin(i)*2;scene.add(num);
  if(isLie){
    for(let j=0;j<4;j++){
      const xGeometry=new THREE.BoxGeometry(4,0.5,0.3);
      const xMaterial=new THREE.MeshBasicMaterial({color:0xffff00,emissive:0xffff00,emissiveIntensity:2.0});
      const x=new THREE.Mesh(xGeometry,xMaterial);
      x.position.x=num.position.x;x.position.y=num.position.y;x.position.z=0.6;
      x.rotation.z=j===0?Math.PI/4:-Math.PI/4;
      scene.add(x);
    }
  }
}
for(let i=0;i<3;i++){
  const ringGeometry=new THREE.TorusGeometry(10+i*2,0.3,8,50);
  const ringMaterial=new THREE.MeshBasicMaterial({color:i===0?0x00ffff:(i===1?0xff0055:0xffff00),transparent:true,opacity:0.5});
  const ring=new THREE.Mesh(ringGeometry,ringMaterial);
  scene.add(ring);
}
const ambientLight=new THREE.AmbientLight(0x004444,1.5);scene.add(ambientLight);
const pointLight1=new THREE.PointLight(0x00ffff,3,100);pointLight1.position.set(15,15,20);scene.add(pointLight1);
const pointLight2=new THREE.PointLight(0xff0055,3,100);pointLight2.position.set(-15,15,20);scene.add(pointLight2);
const pointLight3=new THREE.PointLight(0xffff00,3,100);pointLight3.position.set(0,15,25);scene.add(pointLight3);
camera.position.set(0,3,22);camera.lookAt(0,0,0);let time=0;
function animate(){requestAnimationFrame(animate);time+=0.02;scene.rotation.y=Math.sin(time)*0.08;scene.children.forEach(child=>{if(child.geometry&&child.geometry.type==='TorusGeometry')child.rotation.z+=0.01;});renderer.render(scene,camera);}
animate();
</script></body></html>
